<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Political Ideology Quiz</title>
    <script>
        function shareResults() {
            const resultText = document.getElementById('result').innerText;
            const currentUrl = window.location.href;
            const shareableLink = `${currentUrl}?result=${encodeURIComponent(resultText)}`;
            document.getElementById('shareable-link').innerText = shareableLink;
            document.getElementById('shareable-link').href = shareableLink;
        }
    </script>
</head>
<body>
    <h1>Political Ideology Quiz</h1>
    <!-- Quiz content goes here -->
    <div id="result">Your results will appear here.</div>
    <button onClick="shareResults()">Share Results</button>
    <a id="shareable-link" target="_blank"></a>
</body>
</html>
